<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Shooter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>

        <div id="menu-screen" class="overlay">
            <h1>Platform Shooter</h1>
            <p class="prompt">Press Enter or Click to Start</p>
            <h2>High Scores</h2>
            <ol id="score-list"><li>No scores yet</li></ol>
        </div>

        <div id="gameover-screen" class="overlay" style="display:none">
            <h1>Game Over</h1>
            <p>Score: <span id="final-score">0</span></p>
            <p id="rank-display"></p>
            <div class="score-form">
                <input type="text" id="name-input" maxlength="20" placeholder="Enter your name">
                <button id="submit-score">Submit Score</button>
            </div>
            <button id="play-again">Play Again</button>
            <h2>High Scores</h2>
            <ol id="go-score-list"><li>No scores yet</li></ol>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
